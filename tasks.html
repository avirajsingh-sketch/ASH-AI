<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tasks — ASH</title>
  <link rel="icon" href="/static/assets/favicon.svg" type="image/svg+xml"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body data-page="tasks">
  <div class="toast-wrap" id="toast-wrap"></div>
  <div class="app-layout">
    {% include '_sidebar.html' %}
    <div class="main-content">
      <header class="topbar">
        <button class="hamburger" id="hamburger" aria-label="Toggle sidebar"><span></span><span></span><span></span></button>
        <div class="topbar-title">Tasks</div>
        <div class="topbar-status">
          <div class="status-dot"></div>
          <span id="tasks-count-label">Loading…</span>
        </div>
      </header>
      <div class="page-body page-enter">
        <div class="p2-page-grid">
          <div class="p2-sidebar-panel">
            <div class="card" style="margin-bottom:16px;">
              <h3 style="font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:16px;">New Task</h3>
              <form id="create-task-form">
                <div class="form-group">
                  <label for="task-title">Title</label>
                  <input type="text" id="task-title" placeholder="Task title" required maxlength="200"/>
                </div>
                <div class="form-group">
                  <label for="task-desc">Description</label>
                  <textarea id="task-desc" class="p2-textarea" placeholder="Optional details…" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top:4px;">
                  <span class="btn-spinner"></span>
                  <span class="btn-label">Create Task</span>
                </button>
              </form>
            </div>
            <div class="card">
              <h3 style="font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:12px;">Filter</h3>
              <div class="p2-filter-list" id="tasks-filter">
                <button class="p2-filter-btn active" data-status="all">All</button>
                <button class="p2-filter-btn" data-status="pending">Pending</button>
                <button class="p2-filter-btn" data-status="completed">Completed</button>
                <button class="p2-filter-btn" data-status="cancelled">Cancelled</button>
              </div>
            </div>
          </div>
          <div>
            <div class="section-head">
              <h2>Task Queue</h2>
              <button class="btn btn-ghost btn-sm" id="refresh-tasks-btn">↻ Refresh</button>
            </div>
            <div id="task-list">
              <div class="p2-loading">
                <div class="skel" style="height:90px;border-radius:12px;margin-bottom:10px;"></div>
                <div class="skel" style="height:90px;border-radius:12px;"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
