<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memory — ASH</title>
  <link rel="icon" href="/static/assets/favicon.svg" type="image/svg+xml"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body data-page="memory">
  <div class="toast-wrap" id="toast-wrap"></div>
  <div class="app-layout">
    {% include '_sidebar.html' %}
    <div class="main-content">
      <header class="topbar">
        <button class="hamburger" id="hamburger" aria-label="Toggle sidebar"><span></span><span></span><span></span></button>
        <div class="topbar-title">Memory</div>
        <div class="topbar-status">
          <div class="status-dot"></div>
          <span id="memory-count-label">Loading…</span>
        </div>
      </header>
      <div class="page-body page-enter">
        <div class="p2-page-grid">
          <div class="p2-sidebar-panel">
            <div class="card" style="margin-bottom:16px;">
              <h3 style="font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:16px;">Add Memory</h3>
              <form id="add-memory-form">
                <div class="form-group">
                  <label for="mem-content">Content</label>
                  <textarea id="mem-content" class="p2-textarea" placeholder="What should ASH remember?" rows="4" required maxlength="2000"></textarea>
                </div>
                <div class="form-group">
                  <label for="mem-category">Category</label>
                  <select id="mem-category" class="p2-select">
                    <option value="general">General</option>
                    <option value="task">Task</option>
                    <option value="preference">Preference</option>
                    <option value="fact">Fact</option>
                    <option value="note">Note</option>
                  </select>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top:4px;">
                  <span class="btn-spinner"></span>
                  <span class="btn-label">Save Memory</span>
                </button>
              </form>
            </div>
            <div class="card">
              <h3 style="font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:12px;">Filter</h3>
              <div class="p2-filter-list" id="memory-filter">
                <button class="p2-filter-btn active" data-category="all">All</button>
                <button class="p2-filter-btn" data-category="general">General</button>
                <button class="p2-filter-btn" data-category="task">Task</button>
                <button class="p2-filter-btn" data-category="preference">Preference</button>
                <button class="p2-filter-btn" data-category="fact">Fact</button>
                <button class="p2-filter-btn" data-category="note">Note</button>
              </div>
            </div>
          </div>
          <div>
            <div class="section-head">
              <h2>Memory Nodes</h2>
              <button class="btn btn-ghost btn-sm" id="refresh-memory-btn">↻ Refresh</button>
            </div>
            <div id="memory-list">
              <div class="p2-loading">
                <div class="skel" style="height:80px;border-radius:12px;margin-bottom:10px;"></div>
                <div class="skel" style="height:80px;border-radius:12px;"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
