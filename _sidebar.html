    <a href="/chat" class="nav-item" data-path="/chat">

        {{ (current_user.name or current_user.email or 'U')[0] | upper }}

      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="sb-name">
          {{ current_user.name or current_user.email or 'User' }}
        </div>
        <div class="sidebar-user-role">Agent Operator</div>
      </div>
