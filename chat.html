<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat — ASH</title>
  <link rel="icon" href="/static/assets/favicon.svg" type="image/svg+xml"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body data-page="chat">
  <div class="toast-wrap" id="toast-wrap"></div>
  <div class="app-layout">
    {% include '_sidebar.html' %}
    <div class="main-content chat-main">
      <header class="topbar">
        <button class="hamburger" id="hamburger" aria-label="Toggle sidebar">
          <span></span><span></span><span></span>
        </button>
        <div style="display:flex;align-items:center;gap:10px;flex:1;">
          <div class="chat-topbar-avatar">🤖</div>
          <div>
            <div class="topbar-title" style="line-height:1.2;">ASH Agent</div>
            <div style="font-size:11px;color:var(--success);display:flex;align-items:center;gap:5px;">
              <span class="status-dot" style="width:5px;height:5px;"></span> Online
            </div>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" id="clear-chat-btn" title="Clear conversation">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Clear
        </button>
      </header>

      <div class="chat-messages" id="chat-messages">
        <div class="chat-welcome" id="chat-welcome">
          <div class="chat-welcome-icon">🤖</div>
          <h3>Chat with ASH</h3>
          <p>I'm your autonomous AI agent, created by <strong>Aviraj and Sehaj</strong>.<br/>
             Ask me anything — tasks, memory, your goals, or just say hello.</p>
          <div class="chat-welcome-chips">
            <button class="chat-chip" data-msg="Who created you?">Who created you?</button>
            <button class="chat-chip" data-msg="What can you do?">What can you do?</button>
            <button class="chat-chip" data-msg="Check system status">System status</button>
            <button class="chat-chip" data-msg="What memories do I have?">My memories</button>
          </div>
        </div>
      </div>

      <div class="chat-typing-wrap" id="chat-typing" style="display:none;">
        <div class="chat-bubble-ash">
          <div class="chat-avatar-ash">🤖</div>
          <div class="chat-bubble-body chat-typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <div class="chat-input-area">
        <div class="chat-input-wrap">
          <textarea id="chat-input" class="chat-textarea" placeholder="Message ASH…" rows="1" maxlength="2000"></textarea>
          <button class="chat-send-btn" id="chat-send-btn" aria-label="Send message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <div class="chat-input-footer">ASH · Phase 3.5 · Created by Aviraj &amp; Sehaj</div>
      </div>
    </div>
  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
